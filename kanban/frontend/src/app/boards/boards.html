<div class="p-4">
  <h1 class="text-xl font-bold mb-4">Boards</h1>

  <input #boardName type="text" placeholder="New Board" class="border rounded p-2 mr-2" />
  <button class="bg-blue-500 text-white rounded p-2" (click)="addBoard(boardName.value); boardName.value=''">
    Add Board
  </button>

  <div class="grid grid-cols-3 gap-4 mt-4">
    <div *ngFor="let board of boards" class="bg-gray-100 p-4 rounded shadow">
      {{ board.name }}
    </div>
  </div>
</div>
